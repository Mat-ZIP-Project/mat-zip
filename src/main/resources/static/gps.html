<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<button onclick="getLocation()">현 위치 인증하기</button>
<div id="locationDisplay"></div>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=f41bede20c43ca0dfe2c40e050a86c9a&libraries=services"></script>
<script>



    function getLocation() {

        navigator.geolocation.getCurrentPosition(success, error);
    }

    function success(pos) {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        const geocoder = new kakao.maps.services.Geocoder();
        const coord = new kakao.maps.LatLng(lat, lon);

        geocoder.coord2RegionCode(coord.getLng(), coord.getLat(), function (result, status) {
            if (status === kakao.maps.services.Status.OK) {
                const location = `${result[0].region_1depth_name} ${result[0].region_2depth_name}`;
                document.getElementById("locationDisplay").innerText = location;

                fetch("http://localhost:8080/map/position", {
                    method: "get",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        regionName: location,
                        id : 1
                    })
                })
                    .then(res => res.text())
                    .then(msg => alert(msg+" 인증 되었습니다."));
            }
        });
    }

    function error(err) {
        alert("GPS 권한이 필요합니다.");
    }
</script>


</body>
</html>
