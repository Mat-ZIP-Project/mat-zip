<div id="map" style="width:70%; height:500px; float:left;"></div>
<div id="roadview" style="width:30%; height:500px; float:right;"></div>

<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=f41bede20c43ca0dfe2c40e050a86c9a&libraries=services"></script>
<script>
    navigator.geolocation.getCurrentPosition((pos)=> {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        const myPosition = new kakao.maps.LatLng(lat, lon);

        const mapContainer = document.getElementById('map');
        const mapOption = {
            center: myPosition,
            level: 3
        };

        const map = new kakao.maps.Map(mapContainer, mapOption);
        //로드뷰
        const roadviewContainer = document.getElementById('roadview');
        const roadview = new kakao.maps.Roadview(roadviewContainer);
        const roadviewClient = new kakao.maps.RoadviewClient();

        // 내 위치 기준 거리뷰 표시

        roadviewClient.getNearestPanoId(myPosition, 50, function(panoId) {
            if (panoId) {
                roadview.setPanoId(panoId, myPosition);
            }
        });
        // 내 위치 마커
        const marker = new kakao.maps.Marker({
            position: myPosition
        });
        marker.setMap(map);

        // 서버에 내 위치 전송
        fetch(`http://localhost:8080/restaurants/nearby?lat=${lat}&lon=${lon}`)
        .then(res => res.json())
            .then(data => {
                data.forEach(restaurant => {
                    const marker = new kakao.maps.Marker({
                        position: new kakao.maps.LatLng(restaurant.latitude, restaurant.longitude)
                    });
                    marker.setMap(map);
                    // 마커 클릭 시 거리뷰 표시
                    kakao.maps.event.addListener(marker, 'click', () => {
                        const position = new kakao.maps.LatLng(restaurant.latitude, restaurant.longitude);
                        map.setCenter(position); // 지도 중심 이동
                        roadviewClient.getNearestPanoId(position, 50, function(panoId) {
                            if (panoId) {
                                roadview.setPanoId(panoId, position);
                            } else {
                                alert("이 위치는 거리뷰가 제공되지 않습니다.");
                            }
                        });
                    });
                });
            });
    });
</script>
